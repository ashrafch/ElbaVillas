<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="pf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6c98a"/>
      <stop offset="0.55" stop-color="#fbe3b4"/>
      <stop offset="1" stop-color="#fdf0d2"/>
    </linearGradient>
    <radialGradient id="pf-sun" cx="0.72" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#fff4d8" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ffe7b0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffe7b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pf-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9cf9c"/>
      <stop offset="0.4" stop-color="#a9bda0"/>
      <stop offset="1" stop-color="#5f8378"/>
    </linearGradient>
    <linearGradient id="pf-ref" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3d4" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#fff3d4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#pf-sky)"/>
  <rect width="1600" height="1000" fill="url(#pf-sun)"/>
  <circle cx="1152" cy="296" r="74" fill="#fff1cf"/>
  <!-- distant hazy coast -->
  <path d="M0 552 C 220 520 380 540 560 524 C 760 506 980 532 1240 512 C 1400 500 1520 520 1600 510 L1600 560 L0 560 Z" fill="#ecceA0" opacity="0.55"/>
  <path d="M0 556 C 260 540 520 548 760 536 C 1040 522 1320 544 1600 532 L1600 562 L0 562 Z" fill="#e3c195" opacity="0.6"/>
  <!-- promontory with town -->
  <path d="M120 560 C 180 470 300 430 430 444 C 520 454 560 500 600 560 Z" fill="#c39f6e"/>
  <g fill="#b1875a">
    <rect x="250" y="470" width="26" height="58"/><rect x="286" y="486" width="22" height="42"/>
    <rect x="320" y="462" width="30" height="66"/><rect x="360" y="492" width="20" height="36"/>
    <rect x="392" y="478" width="26" height="50"/><rect x="430" y="500" width="22" height="28"/>
  </g>
  <g fill="#7e5a39"><rect x="318" y="430" width="34" height="34"/></g>
  <g fill="#ffe3a3"><rect x="258" y="486" width="6" height="8"/><rect x="328" y="478" width="6" height="8"/><rect x="398" y="494" width="6" height="8"/></g>
  <!-- sea -->
  <rect y="560" width="1600" height="440" fill="url(#pf-sea)"/>
  <rect x="1070" y="560" width="164" height="440" fill="url(#pf-ref)"/>
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="3" fill="none">
    <path d="M120 640 q 60 -10 120 0 t 120 0"/>
    <path d="M900 700 q 70 -12 140 0 t 140 0"/>
    <path d="M300 800 q 80 -12 160 0 t 160 0"/>
  </g>
  <!-- boats -->
  <g fill="#3c4a44">
    <path d="M720 626 l54 0 -10 18 -34 0 z"/><path d="M744 600 l2 26 16 0 z"/>
    <path d="M980 660 l44 0 -8 14 -28 0 z"/><path d="M1000 640 l1 20 12 0 z"/>
  </g>
</svg>
