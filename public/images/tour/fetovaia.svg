<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="ft-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#73b6d8"/>
      <stop offset="0.7" stop-color="#c2e2ef"/>
      <stop offset="1" stop-color="#e9f5f5"/>
    </linearGradient>
    <linearGradient id="ft-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2fa1ac"/>
      <stop offset="0.5" stop-color="#57c0c0"/>
      <stop offset="1" stop-color="#9fe0d4"/>
    </linearGradient>
    <linearGradient id="ft-sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecd9a8"/>
      <stop offset="1" stop-color="#d8bd86"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#ft-sky)"/>
  <!-- headland right (green promontory) -->
  <path d="M1140 520 C 1260 470 1380 486 1500 470 C 1560 462 1600 470 1600 470 L1600 620 L1140 620 Z" fill="#5d8560"/>
  <path d="M1140 520 C 1260 470 1380 486 1500 470 L1500 540 C 1380 552 1260 548 1140 560 Z" fill="#6f9a6c" opacity="0.7"/>
  <!-- sea -->
  <rect y="520" width="1600" height="320" fill="url(#ft-sea)"/>
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="3" fill="none">
    <path d="M160 600 q 70 -10 140 0 t 140 0"/>
    <path d="M700 660 q 80 -12 160 0 t 160 0"/>
  </g>
  <!-- shallow turquoise band near shore -->
  <path d="M0 760 C 360 730 760 745 1080 770 C 1240 782 1360 778 1600 786 L1600 840 L0 840 Z" fill="#bdeee0" opacity="0.7"/>
  <!-- golden sand foreground -->
  <path d="M0 1000 L0 800 C 360 760 780 778 1100 812 C 1320 836 1460 824 1600 832 L1600 1000 Z" fill="url(#ft-sand)"/>
  <g fill="#c9ab74" opacity="0.5">
    <ellipse cx="300" cy="930" rx="120" ry="16"/><ellipse cx="900" cy="960" rx="160" ry="18"/>
  </g>
</svg>
